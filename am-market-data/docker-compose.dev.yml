version: '3.8'

services:
  am-market-data-service:
    # OVERRIDE: Map the locally built JAR directly into the container.
    # This skips the need to 'docker build' when code changes.
    # Workflow: 
    # 1. Run 'mvn package -DskipTests' to build the JAR
    # 2. Run 'docker-compose -f docker-compose.dev.yml up -d'
    image: eclipse-temurin:17-jre-jammy
    container_name: am-market-data-dev
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=am_kafka:9092
    volumes:
      - ./market-data-app/target/market-data-app-1.0-SNAPSHOT.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar"]
    networks:
      - am-net
    restart: unless-stopped

networks:
  am-net:
    external: true
    name: am-infra_am-net
