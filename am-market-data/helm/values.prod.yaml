# Production Environment Configuration
environment: prod

replicaCount: 1

# Application Configuration
config:
  marketData:
    maxRetries: 3
    retryDelayMs: 1000
    threadPoolSize: 5
    threadQueueCapacity: 10
    maxAgeMinutes: 15

# Service Configuration
service:
  type: ClusterIP
  port: 8080

# Ingress Configuration
ingress:
  enabled: true
  ipAddress: 20.59.109.241

# Resource Configuration
resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

# PostgreSQL Configuration (Inherited from Vault)
postgresql:
  enabled: false

# Vault Configuration (Standardised for Prod)
vault:
  enabled: true
  secretPaths:
    postgres: "secret/data/prod/infra/postgres"
    mongodb: "secret/data/prod/infra/mongodb"
    redis: "secret/data/prod/infra/redis"
    influxdb: "secret/data/prod/infra/influxdb"
    kafka: "secret/data/prod/infra/kafka"
    zerodha: "secret/data/prod/api/zerodha"
    upstock: "secret/data/prod/api/upstock"

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus:
    scrape: true
    port: "8080"
    path: "/actuator/prometheus"
