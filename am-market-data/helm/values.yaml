replicaCount: 1
port: 8092
language: java

global:
  vault:
    serviceAccountName: "am-backend-sa"

image:
  repository: am-market-data
  pullPolicy: Always
  tag: "latest"

ingress:
  enabled: false
  className: "nginx"

security:
  automountServiceAccountToken: true
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: market-data.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 200m
    memory: 512Mi

# Vault configuration
vault:
  enabled: true
  role: "am-backend-role"
  secretPaths: {}

# Application specific configuration
config:
  marketData:
    maxRetries: 5
    retryDelayMs: 2000
  env: "preprod"
