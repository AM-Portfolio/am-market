## Default values for market-data service
## This is a YAML-formatted file.

replicaCount: 1
port: 8092
language: java

image:
  repository: am-market-data
  pullPolicy: Always
  tag: "latest"

ingress:
  enabled: false
  className: "nginx"

security:
  automountServiceAccountToken: true
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: market-data.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 200m
    memory: 512Mi

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment configuration
environment: "preprod"

# PostgreSQL configuration
postgresql:
  enabled: false
  fullname: "postgresql"
  primary:
    service:
      port: 5432
  auth:
    database: "marketdata"

# Vault configuration
vault:
  enabled: true
  role: "am-backend-role"
  secretPaths:
    postgres: "secret/data/preprod/infra/postgres"
    mongodb: "secret/data/preprod/infra/mongodb"
    redis: "secret/data/preprod/infra/redis"
    influxdb: "secret/data/preprod/infra/influxdb"
    kafka: "secret/data/preprod/infra/kafka"
    zerodha: "secret/data/preprod/api/zerodha"
    upstock: "secret/data/preprod/api/upstock"

# Application specific configuration
config:
  marketData:
    maxRetries: 3
    retryDelayMs: 1000
    threadPoolSize: 5
    threadQueueCapacity: 10
    maxAgeMinutes: 15

# Monitoring configuration (Prometheus auto-discovery)
monitoring:
  enabled: true
  prometheus:
    enabled: true
    scrape: "true"
    path: "/actuator/prometheus"
    port: "8080"
