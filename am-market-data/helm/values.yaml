replicaCount: 1
service:
  port: 8080
language: java

global:
  vault:
    serviceAccountName: "am-backend-sa"

image:
  repository: am-market-data
  pullPolicy: Always
  tag: "24962128676"

ingress:
  enabled: false
  className: "nginx"

security:
  automountServiceAccountToken: true
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: market-data.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 200m
    memory: 512Mi

# Application specific configuration
config:
  marketData:
    maxRetries: 5
    retryDelayMs: 2000
  env: "preprod"
