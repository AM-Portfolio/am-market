replicaCount: 1
port: 8080
language: java

global:
  vault:
    serviceAccountName: "am-backend-sa"

image:
  repository: am-market-data
  pullPolicy: Always
  tag: "latest"

ingress:
  enabled: false
  className: "nginx"

security:
  automountServiceAccountToken: true
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: market-data.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 200m
    memory: 512Mi

# Vault configuration
vault:
  enabled: true
  role: "am-backend-role"
  secretPaths:
    postgres:
      path: "apps/data/preprod/infra/postgres"
    mongodb: 
      path: "apps/data/preprod/infra/mongodb"
    redis: 
      path: "apps/data/preprod/infra/redis"
    influxdb: 
      path: "apps/data/preprod/infra/influxdb"
    jwt:
      path: "apps/data/preprod/services/am-market-data"
    kafka: 
      path: "apps/data/preprod/infra/kafka"
    zerodha:
      path: "apps/data/preprod/services/am-market-data"
    upstox: 
      path: "apps/data/preprod/services/am-market-data"

# Application specific configuration
config:
  marketData:
    maxRetries: 5
    retryDelayMs: 2000
  env: "preprod"
