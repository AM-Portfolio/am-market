## Default values for market-data service
## This is a YAML-formatted file.

replicaCount: 1
port: 8092
language: java

global:
  vault:
    serviceAccountName: "am-backend-sa"

image:
  repository: am-market-data
  pullPolicy: Always
  tag: "latest"

ingress:
  enabled: false
  className: "nginx"

security:
  automountServiceAccountToken: true
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: market-data.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 200m
    memory: 512Mi

# Vault configuration
vault:
  enabled: true
  role: "am-backend-role"
  secretPaths:
    postgres: "secret/data/preprod/infra/postgres"
    mongodb: "secret/data/preprod/infra/mongodb"
    redis: "secret/data/preprod/infra/redis"
    influxdb: "secret/data/preprod/infra/influxdb"
    kafka: "secret/data/preprod/infra/kafka"
    zerodha: "secret/data/preprod/api/zerodha"
    upstox:
      path: "secret/data/preprod/api/upstox"
      template: |
        export UPSTOX_API_KEY="{{ .Data.data.API_KEY }}"
        export UPSTOX_SECRET_KEY="{{ .Data.data.SECRET_KEY }}"
        export UPSTOX_ACCESS_TOKEN="{{ .Data.data.ACCESS_TOKEN }}"
        export UPSTOX_BASEURL="{{ .Data.data.BASE_URL | default "https://api.upstox.com/v2" }}"
        export UPSTOX_CODE="{{ .Data.data.CODE | default "" }}"

# Application specific configuration
config:
  marketData:
    maxRetries: 5
    retryDelayMs: 2000
