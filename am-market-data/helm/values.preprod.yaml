# Pre-production Environment Configuration (Kind Cluster)
environment: preprod

# Application Configuration
config:
  marketData:
    maxRetries: 3
    retryDelayMs: 1000
    threadPoolSize: 5
    threadQueueCapacity: 10
    maxAgeMinutes: 15

# Service Configuration
service:
  type: ClusterIP
  port: 8080

# Ingress Configuration (disabled for Kind)
ingress:
  enabled: false
  ipAddress: 127.0.0.1

# Resource Configuration (reduced for Kind)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# PostgreSQL Configuration (deployed in am-np-west namespace)
postgresql:
  enabled: false
  fullname: postgresql.am-np-west.svc.cluster.local
  auth:
    database: marketdata
    username: postgres
    password: postgres123
  primary:
    service:
      port: 5432

# Vault Configuration
vault:
  enabled: true

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus:
    scrape: true
    port: "8080"
    path: "/actuator/prometheus"

# Environment Variables
env:
  INFRA_HOST: "am-infra-mongodb.am-apps-preprod.svc.cluster.local"
  MONGODB_DATABASE: "market_data" # Breaks the circular reference loop in Spring Boot
