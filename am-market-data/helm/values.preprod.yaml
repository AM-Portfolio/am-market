env:
  SPRING_PROFILES_ACTIVE: "preprod"
  JAVA_OPTS: "-Xms256m -Xmx512m -Dspring.profiles.active=preprod"
environment: preprod

probes:
  port: 8080
  liveness:
    path: /actuator/health/liveness
    timeoutSeconds: 10
  readiness:
    path: /actuator/health/readiness
    timeoutSeconds: 10

# Vault configuration
vault:
  enabled: true
  role: "am-backend-role"
  secretPaths:
    postgres:
      path: "apps/data/preprod/infra/postgres"
    mongodb:
      path: "apps/data/preprod/infra/mongodb"
    redis:
      path: "apps/data/preprod/infra/redis"
    influxdb:
      path: "apps/data/preprod/infra/influxdb"
    kafka:
      path: "apps/data/preprod/infra/kafka"
    market-data:
      path: "apps/data/preprod/services/am-market-data"
    upstox:
      path: "apps/data/preprod/services/am-market-data"

# Application Configuration
config:
  marketData:
    maxRetries: 3
    retryDelayMs: 1000
    threadPoolSize: 5
    threadQueueCapacity: 10
    maxAgeMinutes: 15

# Service Configuration
service:
  type: ClusterIP
  port: 8080

# Ingress Configuration (disabled for Kind)
ingress:
  enabled: false
  ipAddress: 127.0.0.1

# Resource Configuration (reduced for Kind)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

replicaCount: 1

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus:
    scrape: true
    port: "8080"
    path: "/actuator/prometheus"
