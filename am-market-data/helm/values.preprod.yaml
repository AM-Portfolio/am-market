env:
  SPRING_PROFILES_ACTIVE: "preprod"
  JAVA_OPTS: "-Xms256m -Xmx512m -Dspring.profiles.active=preprod"
environment: preprod

probes:
  port: 8080

  startup:
    path: /actuator/health/liveness
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 18

  liveness:
    path: /actuator/health/liveness
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readiness:
    path: /actuator/health/readiness
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Application Configuration
config:
  marketData:
    maxRetries: 3
    retryDelayMs: 1000
    threadPoolSize: 5
    threadQueueCapacity: 10
    maxAgeMinutes: 15

# Service Configuration
service:
  type: ClusterIP
  port: 8080

# Ingress Configuration (disabled for Kind)
ingress:
  enabled: false
  ipAddress: 127.0.0.1

# Resource Configuration (reduced for Kind)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Vault Configuration (Inherited from base with dynamic aliases)
vault:
  enabled: true

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus:
    scrape: true
    port: "8080"
    path: "/actuator/prometheus"
