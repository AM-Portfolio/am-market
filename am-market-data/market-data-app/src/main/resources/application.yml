# PostgreSQL Configuration
# POSTGRES_PASSWORD: password
# POSTGRES_USERNAME: postgres
# POSTGRES_URL: jdbc:postgresql://localhost:5456
# POSTGRES_DATABASE: portfolio
INFRA_HOST: ${INFRA_HOST:localhost}
#mongoDB Configuration
MONGODB_DATABASE_NAME: ${MONGODB_DATABASE:market_data}
MONGODB_USERNAME_INTERNAL: ${MONGODB_USERNAME:admin}
MONGODB_PASSWORD_INTERNAL: ${MONGODB_PASSWORD:password123}

# InfluxDB Configuration
INFLUXDB_TOKEN_INTERNAL: ${INFLUXDB_TOKEN:my-super-secret-auth-token}
INFLUXDB_ORG_INTERNAL: ${INFLUXDB_ORG:am-portfolio}
INFLUXDB_BUCKET_INTERNAL: ${INFLUXDB_BUCKET:market-data}
INFLUXDB_URL_INTERNAL: http://${INFRA_HOST}:8086

# Redis Configuration
REDIS_HOSTNAME: ${INFRA_HOST}
REDIS_PASSWORD_INTERNAL: ${REDIS_PASSWORD:password123}
REDIS_PORT: 6379

# Grafana Configuration
GRAFANA_ADMIN_USER: 1109403
GRAFANA_ADMIN_PASSWORD: XXXXXXXXXX

# Application Configuration
STOKUPATE_TOPIC_NAME: am-stock-price-update
NSE_INDICES_TOPIC_NAME: nse-indices-update
NSE_STOCK_INDICES_TOPIC_NAME: nse-stock-indices-update
BOARD_OF_DIRECTORS_TOPIC_NAME: stock-board-of-directors
QUATERLY_FINANCIALS_TOPIC_NAME: stock-quaterly-financials
STOCK_RESULTS_FINANCIALS_TOPIC_NAME: stock-results-financials
STOCK_PROFIT_AND_LOSS_FINANCIALS_TOPIC_NAME: stock-profit-and-loss-financials
STOCK_BALANCE_SHEET_FINANCIALS_TOPIC_NAME: stock-balance-sheet-financials
STOCK_CASH_FLOW_FINANCIALS_TOPIC_NAME: stock-cash-flow-financials
STOCK_FACT_SHEET_DIVIDEND_FINANCIALS_TOPIC_NAME: stock-fact-sheet-dividend-financials

MARKET_DATA_MAX_RETRIES: 3
MARKET_DATA_RETRY_DELAY_MS: 1000
MARKET_DATA_THREAD_POOL_SIZE: 5
MARKET_DATA_THREAD_QUEUE_CAPACITY: 10
MARKET_DATA_MAX_AGE_MINUTES: 15

# Upstox Configuration
UPSTOX_ACCESS_TOKEN: ${UPSTOX_ACCESS_TOKEN}
UPSTOX_SECRET_KEY: ${UPSTOX_SECRET_KEY}
UPSTOX_CODE: ${UPSTOX_CODE}
MARKET_DATA_KAFKA_ENABLED: ${MARKET_DATA_KAFKA_ENABLED:false}

app:
  kafka:
    enabled: ${MARKET_DATA_KAFKA_ENABLED}

am:
  # Centralized observability from am-core-services
  observability:
    enabled: ${AM_OBSERVABILITY_ENABLED:true}
    request-log:
      # Emit a structured JSON log for every incoming HTTP request
      enabled: true
      ignore-paths:
        - "/actuator/**"
        - "/**/health/**"
        - "/swagger-ui/**"
        - "/v3/api-docs/**"
    sanitize:
      # Mask sensitive fields in log payloads (PII/Credentials)
      extra-fields:
        - code
        - request_token
        - access_token
        - refresh_token
        - client_secret

kafka:
  topics:
    stock-price: am-stock-price-update

spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  application:
    name: market-data-service
  data:
    redis:
      host: ${REDIS_HOSTNAME}
      password: ${REDIS_PASSWORD_INTERNAL}
      port: ${REDIS_PORT:6379}
    mongodb:
      uri: ${MONGODB_URL:mongodb://${MONGODB_USERNAME_INTERNAL}:${MONGODB_PASSWORD_INTERNAL}@${INFRA_HOST}:27017/market_data?authSource=admin}
      database: ${MONGODB_DATABASE_NAME}
      username: ${MONGODB_USERNAME_INTERNAL}
      password: ${MONGODB_PASSWORD_INTERNAL}
      authentication-database: admin

  # Multipart file upload configuration (for bulk security updates)
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB # Maximum file size (CSV/Excel files)
      max-request-size: 10MB # Maximum request size
      file-size-threshold: 2KB # Threshold for writing to disk

  # InfluxDB Configuration
  influx:
    url: ${INFLUXDB_URL_INTERNAL}
    token: ${INFLUXDB_TOKEN_INTERNAL}
    org: ${INFLUXDB_ORG_INTERNAL}
    bucket: ${INFLUXDB_BUCKET_INTERNAL}

  # Management and Metrics Configuration

  config:
    import:
      - classpath:isin.yml
      - classpath:nseindices.yml
      #- classpath:application-external-api.yml
      #- classpath:application-endpoints.yml
      - classpath:application-kafka.yml
      - classpath:application-zerodha.yml

market-data:
  provider: upstox
  stream:
    poll-interval-seconds: 10
  cache:
    enabled: true
    price-ttl-minutes: ${MARKET_DATA_CACHE_PRICE_TTL_MINUTES:15}
    history-ttl-minutes: ${MARKET_HISTORY_DATA_CACHE_HISTORY_TTL_MINUTES:15}
# Logging Configuration
logging:
  file:
    name: ./logs/market-data-app.log # Log file path; logback-spring.xml controls rolling policy
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
      clean-history-on-start: false
  # NOTE: logging.pattern.* removed intentionally.
  # logback-spring.xml now uses am-logback-include.xml (from am-observability-lib) which
  # uses the logstash JSON encoder. Plain-text pattern overrides here would conflict
  # with the JSON encoder and break structured log output in Grafana/Loki.
  level:
    root: WARN
    "[com.am.marketdata]": INFO
    "[com.am.marketdata.scheduler]": INFO
    "[com.am.marketdata.service]": INFO
    "[com.am.marketdata.redis]": INFO
    "[com.am.marketdata.external.api]": WARN
    "[com.am.common.investment.service]": INFO
    "[org.springframework]": WARN
    "[org.apache.kafka]": INFO
    "[org.springframework.data.redis]": WARN # Reduce Redis connection logging

upstox:
  interval: I1
  auth:
    base-url: https://api.upstox.com/v2
    code: ${UPSTOX_CODE}
    api-key: ${UPSTOX_API_KEY}
    secret-key: ${UPSTOX_SECRET_KEY}
    access-token: ${UPSTOX_ACCESS_TOKEN}
    redirect-uri: ${UPSTOX_REDIRECT_URI:http://localhost:${server.port}/v1/market-data/auth/session}
    authorization-url: https://api-v2.upstox.com/login/authorization/dialog
    token-url: https://api-v2.upstox.com/login/authorization/token
    token-refresh-interval: 3600000
    scope: orders feed portfolio

scraper:
  urls:
    - https://www.nseindia.com/

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

scheduler:
  cookie:
    enabled: true
  stock-indices:
    enabled: true
  ingestion:
    enabled: true
    symbols: "NIFTY 50,NIFTY BANK"
    provider: UPSTOX
    force: true
    start-cron: "0 15 9 * * MON-FRI" # 9:15 AM weekdays
    stop-cron: "0 30 15 * * MON-FRI" # 3:30 PM weekdays
  historical:
    sync-cron: "0 15 7 * * *" # 7:15 AM daily
  redis:
    cleanup:
      enabled: true
      cron: "0 0 2 * * *" # 2:00 AM daily

redis:
  cleanup:
    retention:
      days: 7 # Keep last 7 days in Redis
    batch:
      size: 1000 # Process 1000 keys at a time
  cache:
    ttl:
      historical: 2592000 # 30 days
      analysis: 2592000 # 30 days for historical analysis data
      intraday:
        past: 14400 # 4 hours for past dates
        future: 86400 # 24 hours for future dates
        buffer: 14400 # 4 hour buffer after EOD

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      validate-group-membership: false
      group:
        readiness:
          include: diskSpace,mongodb,redis,kafka,influx
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mongodb:
      enabled: true
    redis:
      enabled: true

    influxdb:
      enabled: true
  tracing:
    enabled: true
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

otel:
  service:
    name: ${spring.application.name}
    namespace: am-market

jwt:
  secret: ${JWT_SECRET:internal-service-super-secret-key-32chars-minimum-change-in-prod}

  # Security Configuration
security:
  enabled: ${SECURITY_ENABLED:false} # Disabled by default for development. Set SECURITY_ENABLED=true in production.
