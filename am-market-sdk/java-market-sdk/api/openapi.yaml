openapi: 3.0.1
info:
  contact:
    email: support@amportfolio.com
    name: AM Portfolio Team
  description: "API documentation for the Market Data service providing access to\
    \ stock quotes, historical data, market indices, brokerage calculations, and more."
  license:
    name: Private License
    url: https://amportfolio.com/license
  title: Market Data API Documentation
  version: 1.0.0
servers:
- description: Default Server URL
  url: /
tags:
- description: "API for calculating brokerage, taxes, and other charges for stock\
    \ trades"
  name: Brokerage Calculator
- description: APIs for retrieving market data for various indices
  name: Indices
- description: "APIs for retrieving various types of market data including quotes,\
    \ historical data, option chains, and more"
  name: Market Data
- description: "APIs for market analysis including Top Movers, Sector Performance,\
    \ Market Cap Analysis, and Historical Charts"
  name: Market Analytics
- description: endpoints for exploring security details
  name: Security Explorer
- description: APIs for managing market data WebSocket streams
  name: Market Data Stream
- description: APIs for managing and searching financial instruments
  name: Instrument Management
- description: APIs for calculating margin requirements for trading positions across
    different exchanges and instruments
  name: Margin Calculator
paths:
  /v1/securities/search:
    get:
      operationId: search
      parameters:
      - explode: true
        in: query
        name: query
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            '*/*':
              schema:
                items:
                  $ref: "#/components/schemas/SecurityDocument"
                type: array
          description: OK
      summary: Search securities by symbol or ISIN
      tags:
      - Security Explorer
      x-accepts:
      - '*/*'
    post:
      operationId: searchAdvanced
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecuritySearchRequest"
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                items:
                  $ref: "#/components/schemas/SecurityDocument"
                type: array
          description: OK
      summary: Advanced search securities with filters
      tags:
      - Security Explorer
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /v1/market-data/stream/initiate:
    post:
      description: Initiates a WebSocket connection and returns a structured response
      operationId: initiate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamConnectRequest"
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StreamConnectResponse"
          description: OK
      summary: Connect to market data stream
      tags:
      - Market Data Stream
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /v1/market-data/stream/disconnect:
    post:
      description: Disconnects the WebSocket stream for the specified provider
      operationId: disconnect
      parameters:
      - explode: true
        in: query
        name: provider
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: OK
      summary: Disconnect market data stream
      tags:
      - Market Data Stream
      x-accepts:
      - '*/*'
  /v1/market-data/stream/connect:
    post:
      description: Initiates a WebSocket connection for the specified provider and
        instruments
      operationId: connect
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamConnectRequest"
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: OK
      summary: Connect to market data stream
      tags:
      - Market Data Stream
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /v1/market-data/quotes:
    get:
      description: Retrieves latest quotes for multiple symbols with support for different
        timeframes
      operationId: getQuotes
      parameters:
      - explode: true
        in: query
        name: symbols
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: timeFrame
        required: false
        schema:
          default: 5m
          type: string
        style: form
      - explode: true
        in: query
        name: refresh
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Quotes retrieved successfully
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Internal server error
      summary: Get quotes for multiple symbols
      tags:
      - Market Data
      x-accepts:
      - application/json
    post:
      description: Retrieves latest quotes for multiple symbols with support for different
        timeframes using POST request
      operationId: getQuotesPost
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotesRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Quotes retrieved successfully
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Internal server error
      summary: Get quotes for multiple symbols (POST)
      tags:
      - Market Data
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/market-data/ohlc:
    post:
      description: Retrieves Open-High-Low-Close data for multiple symbols with support
        for different timeframes
      operationId: getOHLC
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OHLCRequest"
        required: true
      responses:
        "400":
          content:
            application/json:
              schema:
                type: object
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                type: object
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OHLC data retrieved successfully
      summary: Get OHLC data for multiple symbols
      tags:
      - Market Data
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/market-data/historical-data:
    post:
      description: Retrieves historical price and volume data for one or more instruments
        with filtering options
      operationId: getHistoricalData
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HistoricalDataRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalDataResponseV1"
          description: Historical data retrieved successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalDataResponseV1"
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalDataResponseV1"
          description: Internal server error
      summary: Get historical market data
      tags:
      - Market Data
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/market-data/auth/logout:
    post:
      description: Invalidates the current broker session and clears authentication
        tokens
      operationId: logout
      responses:
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Logout successful
      summary: Logout and invalidate session
      tags:
      - Market Data
      x-accepts:
      - application/json
  /v1/margin/calculate:
    post:
      description: "Calculate SPAN margin, exposure margin, and total margin requirements\
        \ for a list of positions across different segments"
      operationId: calculateMargin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarginCalculationRequest"
        required: true
      responses:
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarginCalculationResponse"
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarginCalculationResponse"
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarginCalculationResponse"
          description: Margin calculation successful
      summary: Calculate margin requirements
      tags:
      - Margin Calculator
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/margin/calculate-async:
    post:
      description: "Asynchronously calculate SPAN margin, exposure margin, and total\
        \ margin requirements for a list of positions across different segments"
      operationId: calculateMarginAsync
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarginCalculationRequest"
        required: true
      responses:
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarginCalculationResponse"
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarginCalculationResponse"
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarginCalculationResponse"
          description: Margin calculation successful
      summary: Calculate margin requirements asynchronously
      tags:
      - Margin Calculator
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/instruments/update:
    post:
      description: Triggers an update of instruments from the local JSON file (NSE.json).
        Uses streaming to handle large files.
      operationId: updateInstruments
      parameters:
      - explode: true
        in: query
        name: filePath
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: provider
        required: false
        schema:
          default: UPSTOX
          type: string
        style: form
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: OK
      summary: Update Instruments from File
      tags:
      - Instrument Management
      x-accepts:
      - '*/*'
  /v1/instruments/search:
    post:
      description: "Search for instruments using criteria: list of symbols ('gym balls'),\
        \ exchanges, and instrument types. Supports semantic text search combined\
        \ with filters."
      operationId: searchInstruments
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstrumentSearchCriteria"
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                items:
                  type: object
                type: array
          description: OK
      summary: Search Instruments
      tags:
      - Instrument Management
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /v1/indices/batch:
    post:
      description: Retrieves the latest market data for multiple indices in a single
        request
      operationId: getLatestIndicesData
      parameters:
      - description: Force refresh from source instead of using cache
        explode: true
        in: query
        name: forceRefresh
        required: false
        schema:
          default: false
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              description: "List of Index symbols (e.g., NIFTY, BANKNIFTY, FINNIFTY)"
              items:
                type: string
              type: array
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockIndicesMarketData"
          description: Indices data retrieved successfully
        "400":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StockIndicesMarketData"
                type: array
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StockIndicesMarketData"
                type: array
          description: Internal server error
      summary: Get latest market data for multiple indices
      tags:
      - Indices
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/brokerage/calculate:
    post:
      description: "Calculate brokerage, STT, GST, exchange charges, SEBI charges,\
        \ stamp duty, and DP charges for a trade"
      operationId: calculateBrokerage
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerageCalculationRequest"
        required: true
      responses:
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageCalculationResponse"
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageCalculationResponse"
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageCalculationResponse"
          description: Brokerage calculation successful
      summary: Calculate brokerage and taxes
      tags:
      - Brokerage Calculator
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/brokerage/calculate-async:
    post:
      description: "Asynchronously calculate brokerage, STT, GST, exchange charges,\
        \ SEBI charges, stamp duty, and DP charges for a trade"
      operationId: calculateBrokerageAsync
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerageCalculationRequest"
        required: true
      responses:
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageCalculationResponse"
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageCalculationResponse"
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageCalculationResponse"
          description: Brokerage calculation successful
      summary: Calculate brokerage and taxes asynchronously
      tags:
      - Brokerage Calculator
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/admin/sync/historical:
    post:
      operationId: triggerHistoricalSync
      parameters:
      - explode: true
        in: query
        name: symbol
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: forceRefresh
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - explode: true
        in: query
        name: fetchIndexStocks
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: OK
      tags:
      - market-data-admin-controller
      x-accepts:
      - '*/*'
  /v1/admin/ingestion/stop:
    post:
      operationId: stopIngestion
      parameters:
      - explode: true
        in: query
        name: provider
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: OK
      tags:
      - market-data-admin-controller
      x-accepts:
      - '*/*'
  /v1/admin/ingestion/start:
    post:
      operationId: startIngestion
      parameters:
      - explode: true
        in: query
        name: provider
        required: false
        schema:
          default: UPSTOX
          type: string
        style: form
      - explode: true
        in: query
        name: symbols
        required: false
        schema:
          default:
          - NIFTY 50
          - NIFTY BANK
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: OK
      tags:
      - market-data-admin-controller
      x-accepts:
      - '*/*'
  /v1/market-data/symbols/{exchange}:
    get:
      description: Retrieves all available trading symbols for a specific exchange
      operationId: getSymbolsForExchange
      parameters:
      - explode: false
        in: path
        name: exchange
        required: true
        schema:
          type: string
        style: simple
      responses:
        "500":
          content:
            application/json:
              schema:
                items:
                  type: object
                type: array
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                items:
                  type: object
                type: array
          description: Symbols retrieved successfully
      summary: Get symbols for a specific exchange
      tags:
      - Market Data
      x-accepts:
      - application/json
  /v1/market-data/option-chain:
    get:
      description: Retrieves option chain data including calls and puts for a given
        underlying instrument
      operationId: getOptionChain
      parameters:
      - explode: true
        in: query
        name: symbol
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: expiryDate
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: refresh
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Option chain data retrieved successfully
      summary: Get option chain data
      tags:
      - Market Data
      x-accepts:
      - application/json
  /v1/market-data/mutual-fund/{schemeCode}:
    get:
      description: "Retrieves detailed information about a mutual fund including NAV,\
        \ returns, and other metrics"
      operationId: getMutualFundDetails
      parameters:
      - explode: false
        in: path
        name: schemeCode
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: refresh
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Mutual fund details retrieved successfully
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Internal server error
      summary: Get mutual fund details
      tags:
      - Market Data
      x-accepts:
      - application/json
  /v1/market-data/mutual-fund/{schemeCode}/history:
    get:
      description: Retrieves historical Net Asset Value (NAV) data for a mutual fund
        over a specified date range
      operationId: getMutualFundNavHistory
      parameters:
      - explode: false
        in: path
        name: schemeCode
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: from
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: to
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: refresh
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: NAV history retrieved successfully
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Invalid date format or request parameters
      summary: Get mutual fund NAV history
      tags:
      - Market Data
      x-accepts:
      - application/json
  /v1/market-data/live-prices:
    get:
      description: Retrieves real-time market prices for specified symbols or all
        available symbols
      operationId: getLivePrices
      parameters:
      - explode: true
        in: query
        name: symbols
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: isIndexSymbol
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: refresh
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Live prices retrieved successfully
      summary: Get live market prices
      tags:
      - Market Data
      x-accepts:
      - application/json
  /v1/market-data/live-ltp:
    get:
      description: Retrieves current LTP and calculates change based on historical
        closing price for the specified timeframe
      operationId: getLiveLTP
      parameters:
      - explode: true
        in: query
        name: symbols
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: timeframe
        required: false
        schema:
          default: 1D
          type: string
        style: form
      - explode: true
        in: query
        name: isIndexSymbol
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - explode: true
        in: query
        name: refresh
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: object
                type: object
          description: Live LTP with change retrieved successfully
      summary: Get live LTP with change calculation
      tags:
      - Market Data
      x-accepts:
      - application/json
  /v1/market-data/auth/session:
    get:
      description: Creates a new authenticated session using the request token obtained
        from broker login
      operationId: generateSession
      parameters:
      - explode: true
        in: query
        name: request_token
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: requestToken
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: code
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: status
        required: false
        schema:
          default: success
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: Session generated successfully
        "500":
          content:
            application/json:
              schema:
                type: object
          description: Internal server error
        "400":
          content:
            application/json:
              schema:
                type: object
          description: Invalid request token or authentication failed
      summary: Generate session from request token
      tags:
      - Market Data
      x-accepts:
      - application/json
  /v1/market-data/auth/login-url:
    get:
      description: Returns a URL that can be used to authenticate with the broker's
        login page
      operationId: getLoginUrl
      parameters:
      - explode: true
        in: query
        name: provider
        required: false
        schema:
          type: string
        style: form
      responses:
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Login URL generated successfully
      summary: Get login URL for broker authentication
      tags:
      - Market Data
      x-accepts:
      - application/json
  /v1/market-analytics/sectors:
    get:
      description: Aggregates market performance by sector (Industry) from the specified
        index
      operationId: getSectorPerformance
      parameters:
      - explode: true
        in: query
        name: indexSymbol
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: timeFrame
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: expandIndices
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  additionalProperties:
                    type: object
                  type: object
                type: array
          description: Data retrieved successfully
        "500":
          content:
            application/json:
              schema:
                items:
                  additionalProperties:
                    type: object
                  type: object
                type: array
          description: Internal server error
      summary: Get Sector Performance
      tags:
      - Market Analytics
      x-accepts:
      - application/json
  /v1/market-analytics/movers:
    get:
      description: Retrieves top performing or worst performing stocks from the specified
        market index
      operationId: getMovers
      parameters:
      - explode: true
        in: query
        name: type
        required: false
        schema:
          default: gainers
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          format: int32
          type: integer
        style: form
      - explode: true
        in: query
        name: indexSymbol
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: timeFrame
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: expandIndices
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  additionalProperties:
                    type: object
                  type: object
                type: array
          description: Data retrieved successfully
        "500":
          content:
            application/json:
              schema:
                items:
                  additionalProperties:
                    type: object
                  type: object
                type: array
          description: Internal server error
      summary: Get Top Gainers/Losers
      tags:
      - Market Analytics
      x-accepts:
      - application/json
  /v1/market-analytics/historical-charts/{symbol}:
    get:
      description: "Retrieves historical data for charts with various time frames\
        \ (10m, 1H, 1D, 1W, 1M, 5Y, etc.)"
      operationId: getHistoricalCharts
      parameters:
      - explode: false
        in: path
        name: symbol
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: range
        required: false
        schema:
          default: 1D
          type: string
        style: form
      responses:
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalDataResponseV1"
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalDataResponseV1"
          description: Internal server error
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalDataResponseV1"
          description: Chart data retrieved successfully
      summary: Get historical charts data
      tags:
      - Market Analytics
      x-accepts:
      - application/json
  /v1/indices/available:
    get:
      description: Retrieves the list of available indices (Broad and Sector)
      operationId: getAvailableIndices
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: Indices retrieved successfully
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  items:
                    type: string
                  type: array
                type: object
          description: Internal server error
      summary: Get available indices
      tags:
      - Indices
      x-accepts:
      - application/json
  /v1/brokerage/breakeven:
    get:
      description: Calculate the breakeven price for a stock considering all charges
      operationId: calculateBreakeven
      parameters:
      - explode: true
        in: query
        name: symbol
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: price
        required: true
        schema:
          format: double
          type: number
        style: form
      - explode: true
        in: query
        name: quantity
        required: true
        schema:
          format: int32
          type: integer
        style: form
      - explode: true
        in: query
        name: exchange
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: tradeType
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: brokerType
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageCalculationResponse"
          description: Breakeven calculation successful
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageCalculationResponse"
          description: Invalid request parameters
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageCalculationResponse"
          description: Internal server error
      summary: Calculate breakeven price
      tags:
      - Brokerage Calculator
      x-accepts:
      - application/json
