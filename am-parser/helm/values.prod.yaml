environment: prod
replicaCount: 2

vault:
  secretPaths:
    mongodb: 
      path: "secret/data/prod/apps/database"
      template: |
        export MONGO_URI="mongodb://{{ .Data.data.MONGO_USER }}:{{ .Data.data.MONGO_PASSWORD }}@mongodb.infra.svc.cluster.local:27017/am_parser?authSource=admin"
    together: 
      path: "secret/data/prod/apps/api"
      template: |
        export TOGETHER_API_KEY="{{ .Data.data.TOGETHER_API_KEY }}"
