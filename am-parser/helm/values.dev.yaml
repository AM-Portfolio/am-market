# Dev Environment — am-parser
environment: dev
replicaCount: 1

service:
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Vault configuration
vault:
  enabled: true
  secretPaths:
    mongodb:
      path: "apps/data/dev/infra/mongodb"
    together:
      path: "apps/data/dev/infra/shared-api"

hostAliases:
  - ip: "203.174.22.129"
    hostnames:
      - "redis.asrax.in"
      - "mongodb.asrax.in"
      - "kafka.asrax.in"

probes:
  port: 8080
  startup:
    path: "/health"
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: "/health"
  readiness:
    path: "/health"

ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-dev-dev-global-cors@kubernetescrd,
      am-apps-dev-dev-strip-prefix@kubernetescrd
  hosts:
    - host: am-dev.asrax.in
      paths:
        - path: /market/parser
          pathType: Prefix

env:
  SPRING_PROFILES_ACTIVE: "dev"
