env:
  ENVIRONMENT: "preprod"
  MONGO_DB: "mutual_funds"

environment: preprod

probes:
  port: 8000
  liveness:
    path: /health
  readiness:
    path: /health

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Vault Configuration
vault:
  enabled: true