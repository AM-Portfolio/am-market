env:
  ENVIRONMENT: "preprod"
  MONGO_DB: "mutual_funds"

environment: preprod

probes:
  port: 8000
  liveness:
    path: /health
  readiness:
    path: /health

replicaCount: 1

# Vault configuration
vault:
  enabled: true
  role: "am-backend-role"
  secretPaths:
    mongodb: 
      path: "apps/data/preprod/infra/mongodb"
    together:
      path: "apps/data/preprod/infra/shared-api"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Vault Configuration
vault:
  enabled: true