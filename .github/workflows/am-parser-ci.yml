name: am-parser CI

on:
  push:
    paths:
      - 'am-parser/**'
  pull_request:
    paths:
      - 'am-parser/**'

jobs:
  build_and_publish:
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: 'python'
      working_directory: 'am-parser'
      image_name: 'am-parser'
