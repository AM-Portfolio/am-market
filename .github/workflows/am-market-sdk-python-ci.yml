name: am-market-sdk-python CI

on:
  push:
    paths:
      - "am-market-sdk/python-sdk/**"
  pull_request:
    paths:
      - "am-market-sdk/python-sdk/**"

jobs:
  build_and_publish_python:
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-sdk-publish.yml@main
    with:
      language: "python"
      working_directory: "am-market-sdk/python-sdk"
    secrets: inherit
