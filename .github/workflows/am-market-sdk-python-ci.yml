name: am-python-market-sdk CI

on:
  push:
    paths:
      - 'am-market-sdk/python-market-sdk/**'
      - 'am-market-sdk/python-market-sdk/ci-trigger.txt'
  pull_request:
    paths:
      - 'am-market-sdk/python-market-sdk/**'
      - 'am-market-sdk/python-market-sdk/ci-trigger.txt'

jobs:
  build_and_publish_python_market:
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-sdk-publish.yml@main
    with:
      language: 'python'
      working_directory: 'am-market-sdk/python-market-sdk'
    secrets: inherit
