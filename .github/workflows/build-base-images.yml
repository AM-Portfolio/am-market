name: Build and Push Base Images

on:
  push:
    paths:
      - 'Dockerfile.base-*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - language: python
            dockerfile: Dockerfile.base-python
            image_name: am-python-base
          - language: java
            dockerfile: Dockerfile.base-java-maven
            image_name: am-java-maven-base
          - language: flutter
            dockerfile: Dockerfile.base-flutter
            image_name: am-flutter-base

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Base Image
        run: |
          IMAGE_ID="ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}"
          # Docker tags must be lowercase
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          echo "Building $IMAGE_ID..."
          docker build -t $IMAGE_ID:latest -f ${{ matrix.dockerfile }} .
          
          echo "Pushing $IMAGE_ID..."
          docker push $IMAGE_ID:latest
