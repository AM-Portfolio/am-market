name: Market Analytics Publish

on:
  push:
    branches: ["main", "develop", "test/**"]
    paths:
      - "market-data-analysis-py/**"
  pull_request:
    branches: ["main", "develop", "test/**"]
    paths:
      - "market-data-analysis-py/**"
  workflow_dispatch:

jobs:
  publish:
    name: Publish Analytics
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@develop
    with:
      language: "python"
      working_directory: "market-data-analysis-py"
      image_name: "am-market-analysis"
      preprod_namespace: "am-apps-preprod"
      prod_namespace: "am-apps-prod"
      deploy_prod: true
    secrets: inherit
