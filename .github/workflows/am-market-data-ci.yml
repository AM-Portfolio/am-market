name: am-market-data CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'am-market/am-market-data/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'am-market/am-market-data/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: am-market/am-market-data

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package -DskipTests
      
    - name: Run Tests
      run: mvn test
      
    # Placeholder for Docker / Helm publishing
    - name: Docker Build
      run: echo "Building Docker image..."
      
    - name: Update Helm Chart
      run: echo "Updating Helm charts inside helm/ directory..."
