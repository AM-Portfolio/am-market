name: am-common-investment-data CI

# ─────────────────────────────────────────────────────────────────────────────
# LOCATION NOTE: This workflow lives in am-market/.github/workflows/ so all
# CI pipelines are visible in one place.
#
# MOVE GUIDE (if the module moves to its own repo):
#   1. Copy this file to <new-repo>/.github/workflows/
#   2. Remove the `paths: - 'am-common-investment-data/**'` filter
#   3. Change working_directory input to '.' (or the module subpath)
#   4. Everything else stays the same — no other changes needed.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    paths:
      - 'am-common-investment-data/**'
    branches: [ main, develop ]
  pull_request:
    paths:
      - 'am-common-investment-data/**'
  workflow_dispatch:

jobs:
  # ── Build & test locally inside am-market (uses working-directory) ─────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    defaults:
      run:
        # MOVE GUIDE: remove this line when running in a standalone repo
        working-directory: am-common-investment-data

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Build (compile + test)
        run: mvn -B package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      # ── On main: cut a release version, tag and bump to next SNAPSHOT ──────
      - name: Release, tag and bump SNAPSHOT
        if: github.ref == 'refs/heads/main' && contains(steps.version.outputs.version, 'SNAPSHOT')
        run: |
          SNAPSHOT="${{ steps.version.outputs.version }}"
          RELEASE="${SNAPSHOT%-SNAPSHOT}"

          mvn -B versions:set -DnewVersion=$RELEASE -DgenerateBackupPoms=false
          git commit -am "Release $RELEASE [skip ci]"
          git tag -a "am-common-investment-data-v$RELEASE" -m "Release $RELEASE"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          mvn -B versions:set -DnewVersion=$NEXT -DgenerateBackupPoms=false
          git commit -am "Prepare next $NEXT [skip ci]"

          git push origin HEAD:main
          git push origin "am-common-investment-data-v$RELEASE"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # ── Publish — delegates all common publish logic to central workflow ────────
  publish:
    name: Publish to GitHub Packages
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/publish-library.yml@main
    with:
      language: 'java'
      working_directory: 'am-common-investment-data'
      sdk_name: 'am-common-investment-data'
      maven_repo_id: 'github'
      maven_repo_url: 'https://maven.pkg.github.com/AM-Portfolio/am-common-investment-data'
    secrets: inherit
