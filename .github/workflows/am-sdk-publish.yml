name: AM SDK Publish

on:
  push:
    paths:
      - 'am-market-sdk/**'
  pull_request:
    paths:
      - 'am-market-sdk/**'

jobs:
  # Detect which SDK paths changed
  detect-changes:
    name: Detect Changed SDKs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      java-market:    ${{ steps.check.outputs.java-market }}
      python-market:  ${{ steps.check.outputs.python-market }}
      flutter-market: ${{ steps.check.outputs.flutter-market }}
      java-parser:    ${{ steps.check.outputs.java-parser }}
      python-parser:  ${{ steps.check.outputs.python-parser }}
      flutter-parser: ${{ steps.check.outputs.flutter-parser }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect which SDK paths changed
        id: check
        run: |
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          # On first push to a new branch, before is all-zeros → compare only the latest commit
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
          else
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          fi

          echo "=== Files changed in this push ==="
          echo "$CHANGED"
          echo "==================================="

          check() { echo "$CHANGED" | grep -q "^$1" && echo 'true' || echo 'false'; }

          echo "java-market=$(check 'am-market-sdk/java-market-sdk/')"     >> $GITHUB_OUTPUT
          echo "python-market=$(check 'am-market-sdk/python-market-sdk/')" >> $GITHUB_OUTPUT
          echo "flutter-market=$(check 'am-market-sdk/flutter-market-sdk/')" >> $GITHUB_OUTPUT
          echo "java-parser=$(check 'am-market-sdk/java-parser-sdk/')"     >> $GITHUB_OUTPUT
          echo "python-parser=$(check 'am-market-sdk/python-parser-sdk/')" >> $GITHUB_OUTPUT
          echo "flutter-parser=$(check 'am-market-sdk/flutter-parser-sdk/')" >> $GITHUB_OUTPUT

  # --- Market SDKs ---
  publish-java-market:
    name: Publish Java Market SDK
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.java-market == 'true' }}
    permissions:
      contents: write
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/publish-library.yml@main
    with:
      language: 'java'
      working_directory: 'am-market-sdk/java-market-sdk'
      sdk_name: 'java-market-sdk'
    secrets: inherit

  publish-python-market:
    name: Publish Python Market SDK
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.python-market == 'true' }}
    permissions:
      contents: write
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/publish-library.yml@main
    with:
      language: 'python'
      working_directory: 'am-market-sdk/python-market-sdk'
      sdk_name: 'python-market-sdk'
    secrets: inherit

  publish-flutter-market:
    name: Publish Flutter Market SDK
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.flutter-market == 'true' }}
    permissions:
      contents: write
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/publish-library.yml@main
    with:
      language: 'flutter'
      working_directory: 'am-market-sdk/flutter-market-sdk'
      sdk_name: 'flutter-market-sdk'
    secrets: inherit

  # --- Parser SDKs ---
  publish-java-parser:
    name: Publish Java Parser SDK
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.java-parser == 'true' }}
    permissions:
      contents: write
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/publish-library.yml@main
    with:
      language: 'java'
      working_directory: 'am-market-sdk/java-parser-sdk'
      sdk_name: 'java-parser-sdk'
    secrets: inherit

  publish-python-parser:
    name: Publish Python Parser SDK
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.python-parser == 'true' }}
    permissions:
      contents: write
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/publish-library.yml@main
    with:
      language: 'python'
      working_directory: 'am-market-sdk/python-parser-sdk'
      sdk_name: 'python-parser-sdk'
    secrets: inherit

  publish-flutter-parser:
    name: Publish Flutter Parser SDK
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.flutter-parser == 'true' }}
    permissions:
      contents: write
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/publish-library.yml@main
    with:
      language: 'flutter'
      working_directory: 'am-market-sdk/flutter-parser-sdk'
      sdk_name: 'flutter-parser-sdk'
    secrets: inherit
