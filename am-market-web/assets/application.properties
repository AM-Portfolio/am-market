# Application Configuration Properties
# Similar to Spring Boot's application.properties

# API Configuration
api.baseUrl=https://am.munish.org
api.contextPath=/
api.version=v1
api.timeout=30000
# Application Default Port
app.default.port=3000

# Portfolio API Configuration
api.portfolio.baseUrl=https://am.munish.org/api/portfolio
api.portfolio.contextPath=/api/portfolio
api.portfolio.version=v1
api.portfolio.holdingsResource=/v1/portfolios/holdings
api.portfolio.summaryResource=/v1/portfolios/summary
api.portfolio.transactionsResource=/v1/portfolios/transactions

# Trade API Configuration (Following Portfolio Pattern)
api.trade.baseUrl=https://am.munish.org/api/trade
api.trade.contextPath=/api/trade
api.trade.version=v1
api.trade.portfolioListResource=/v1/portfolio-summary/by-owner
api.trade.portfolioSummaryResource=/v1/portfolio-summary  
api.trade.holdingsResource=/v1/trades/portfolio-details
api.trade.tradeDetailsResource=/v1/trades/details/by-ids
api.trade.calendarMonthResource=/v1/trades/calendar/{portfolioId}/month
api.trade.calendarDayResource=/v1/trades/calendar/{portfolioId}/day
api.trade.calendarQuarterResource=/v1/trades/calendar/{portfolioId}/quarter
api.trade.calendarFinancialYearResource=/v1/trades/calendar/{portfolioId}/financial-year
api.trade.searchResource=/v1/trades/search
api.trade.connectTimeout=30
api.trade.receiveTimeout=60
api.trade.sendTimeout=60
api.trade.enabled=true

# Auth API Configuration
# --- Authentication Service ---
# Base URL for auth service
api.auth.baseUrl=https://am.munish.org/auth/token/v1
api.auth.loginEndpoint=/tokens
api.auth.validateEndpoint=/validate
api.auth.refreshEndpoint=/auth/refresh
api.auth.logoutEndpoint=/auth/logout
api.auth.googleLoginEndpoint=/auth/google/token
api.auth.enabled=true

# User API Configuration
# --- User Service ---
# Base URL for user service
api.user.baseUrl=https://am.munish.org/users/account/v1
api.user.registerEndpoint=/register
api.user.forgotPasswordEndpoint=/request-reset
api.user.resetPasswordEndpoint=/confirm-reset
api.user.enabled=true

# Environment Configuration
environment.name=development
environment.debugMode=true
environment.logLevel=debug

# Document API Configuration
# Note: With Retrofit, only baseUrl and client settings are configurable
# API endpoints are hardcoded in @RestApi() annotations
api.document.baseUrl=http://localhost:8070  
api.document.connectTimeout=30
api.document.receiveTimeout=60
api.document.sendTimeout=60
api.document.enabled=true

# Mock Data Configuration
mock.data.enabled=false
mock.data.delay=1000

# Logging Configuration
logging.level=info
logging.console.enabled=true

# Security Configuration
security.jwt.expiration=3600000
security.session.timeout=1800000

# Google Sign-In Configuration
# Get your Client ID from: https://console.cloud.google.com/apis/credentials
# Leave empty for local development (will show setup instructions)
google.web.clientId=536930944518-v4406qrrj4o2pk594g2rc3sk6lfinlf6.apps.googleusercontent.com

# Database Configuration (if needed)
database.host=localhost
database.port=5432
database.name=investment_db

# Feature Flags
features.analytics.enabled=true
features.notifications.enabled=true
features.darkMode.enabled=true
features.trade.enabled=true
features.trade.calendar.enabled=true
features.trade.search.enabled=true

# Performance Settings
cache.ttl=300000
http.connection.timeout=5000
http.read.timeout=10000

# Trade-specific Performance Settings
trade.cache.ttl=180000
trade.pagination.defaultLimit=50
trade.pagination.maxLimit=100
trade.search.minQueryLength=2
trade.calendar.maxDateRange=365

# Gmail API Configuration (Email Extractor Microservice)
api.gmail.baseUrl=http://localhost:8080
api.gmail.statusEndpoint=/api/v1/gmail/status
api.gmail.connectEndpoint=/api/v1/gmail/connect
api.gmail.extractEndpoint=/api/v1/extract/gmail
api.gmail.disconnectEndpoint=/api/v1/gmail/disconnect
api.gmail.brokersEndpoint=/api/v1/brokers
api.gmail.healthEndpoint=/api/v1/health
api.gmail.connectTimeout=30
api.gmail.receiveTimeout=60
api.gmail.sendTimeout=60
api.gmail.enabled=true
