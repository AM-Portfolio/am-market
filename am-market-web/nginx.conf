server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    root /usr/share/nginx/html/market-ui;
    index index.html index.htm;

    # Proxy to am-parser-service for ETF data
    location /etf-api/ {
        # Trailing slash is important to strip /etf-api/ prefix
        proxy_pass http://am-parser-service:8000/;
    }

    # SPA fallback - serve file if exists, otherwise index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
