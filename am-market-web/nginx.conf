server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    root /usr/share/nginx/html/market-ui;
    index index.html index.htm;

    # Proxy to am-parser-service for ETF data
    location /etf-api/ {
        # Trailing slash is important to strip /etf-api/ prefix
        proxy_pass http://am-parser-service:8000/;
    }

    # Serve static assets directly
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|webp|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
